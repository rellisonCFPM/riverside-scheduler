<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Riverside Studio Scheduler</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --cfpm-blue: #036EBB;
      --cfpm-blue-dark: #001421;
      --cfpm-green: #35C934;
      --cfpm-gray: #f5f5f5;
      --text-dark: #1a1a1a;
      --text-light: #666;
      --border-light: #e0e0e0;
      --success: #4caf50;
      --danger: #f44336;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: #fafafa;
      color: var(--text-dark);
      line-height: 1.6;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 1rem;
    }

    /* Header */
    header {
      background: linear-gradient(135deg, var(--cfpm-blue) 0%, #0256a3 100%);
      color: white;
      padding: 2rem 1rem;
      text-align: center;
      box-shadow: 0 2px 8px rgba(3, 110, 187, 0.15);
      margin-bottom: 2rem;
    }

    header h1 {
      font-size: 1.8rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      letter-spacing: -0.5px;
    }

    header p {
      font-size: 0.95rem;
      opacity: 0.95;
      font-weight: 400;
    }

    /* Main layout */
    .layout {
      display: grid;
      grid-template-columns: 1fr;
      gap: 2rem;
      margin-bottom: 2rem;
    }

    @media (min-width: 768px) {
      .layout {
        grid-template-columns: 350px 1fr;
      }
    }

    /* Sidebar */
    .sidebar {
      background: white;
      border-radius: 12px;
      padding: 1.5rem;
      border: 1px solid var(--border-light);
      height: fit-content;
      position: sticky;
      top: 1rem;
    }

    .sidebar h3 {
      color: var(--cfpm-blue);
      font-size: 1rem;
      margin-bottom: 1rem;
      font-weight: 600;
    }

    .form-group {
      margin-bottom: 1.2rem;
    }

    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-dark);
      margin-bottom: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input[type="text"],
    input[type="email"],
    input[type="date"],
    select {
      width: 100%;
      padding: 0.75rem;
      border: 1px solid var(--border-light);
      border-radius: 8px;
      font-size: 0.95rem;
      font-family: inherit;
      transition: all 0.2s ease;
    }

    input[type="text"]:focus,
    input[type="email"]:focus,
    input[type="date"]:focus,
    select:focus {
      outline: none;
      border-color: var(--cfpm-blue);
      box-shadow: 0 0 0 3px rgba(3, 110, 187, 0.1);
    }

    .btn {
      width: 100%;
      padding: 0.85rem 1.5rem;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .btn-primary {
      background: var(--cfpm-blue);
      color: white;
    }

    .btn-primary:hover {
      background: #0256a3;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(3, 110, 187, 0.2);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .btn-secondary {
      background: white;
      color: var(--cfpm-blue);
      border: 2px solid var(--cfpm-blue);
    }

    .btn-secondary:hover {
      background: rgba(3, 110, 187, 0.05);
    }

    .btn-danger {
      background: var(--danger);
      color: white;
      font-size: 0.85rem;
      padding: 0.6rem 1rem;
      width: auto;
    }

    .btn-danger:hover {
      background: #e53935;
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    /* Content */
    .content {
      background: white;
      border-radius: 12px;
      padding: 1.5rem;
      border: 1px solid var(--border-light);
    }

    .content h2 {
      color: var(--cfpm-blue);
      font-size: 1.3rem;
      margin-bottom: 1.5rem;
      font-weight: 600;
    }

    /* Time slots grid */
    .slots-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: 0.8rem;
      margin-top: 1rem;
    }

    @media (min-width: 768px) {
      .slots-grid {
        grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
        gap: 1rem;
      }
    }

    .slot {
      padding: 0.8rem;
      border: 2px solid var(--border-light);
      border-radius: 8px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s ease;
      font-size: 0.85rem;
      font-weight: 600;
      user-select: none;
    }

    .slot.available {
      background: #f0f8ff;
      color: var(--cfpm-blue);
    }

    .slot.available:hover {
      border-color: var(--cfpm-blue);
      background: var(--cfpm-blue);
      color: white;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(3, 110, 187, 0.15);
    }

    .slot.selected {
      background: var(--cfpm-blue);
      color: white;
      border-color: var(--cfpm-blue);
    }

    .slot.booked {
      background: var(--cfpm-gray);
      color: var(--text-light);
      cursor: not-allowed;
      border-color: var(--border-light);
    }

    /* Reservations list */
    .reservations-list {
      margin-top: 2rem;
      border-top: 2px solid var(--border-light);
      padding-top: 2rem;
    }

    .reservation-item {
      background: var(--cfpm-gray);
      padding: 1.2rem;
      border-radius: 8px;
      margin-bottom: 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .reservation-info {
      flex: 1;
      min-width: 200px;
    }

    .reservation-time {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--cfpm-blue);
      margin-bottom: 0.3rem;
    }

    .reservation-name {
      font-size: 0.85rem;
      color: var(--text-light);
    }

    .reservation-item button {
      min-width: 100px;
    }

    /* Status messages */
    .message {
      padding: 1rem;
      border-radius: 8px;
      margin-bottom: 1.5rem;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .message.success {
      background: #e8f5e9;
      color: #2e7d32;
      border-left: 4px solid var(--cfpm-green);
    }

    .message.error {
      background: #ffebee;
      color: #c62828;
      border-left: 4px solid var(--danger);
    }

    .message.info {
      background: #e3f2fd;
      color: #1565c0;
      border-left: 4px solid var(--cfpm-blue);
    }

    /* Loading state */
    .loading {
      text-align: center;
      padding: 2rem;
      color: var(--text-light);
    }

    .spinner {
      display: inline-block;
      width: 40px;
      height: 40px;
      border: 4px solid var(--border-light);
      border-top-color: var(--cfpm-blue);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 1rem;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
      border-bottom: 2px solid var(--border-light);
    }

    .tab-btn {
      background: none;
      border: none;
      padding: 0.8rem 1rem;
      font-weight: 600;
      color: var(--text-light);
      cursor: pointer;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
      transition: all 0.2s ease;
      text-transform: uppercase;
      font-size: 0.8rem;
      letter-spacing: 0.5px;
    }

    .tab-btn.active {
      color: var(--cfpm-blue);
      border-bottom-color: var(--cfpm-blue);
    }

    .tab-btn:hover {
      color: var(--cfpm-blue);
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 2rem;
      color: var(--text-light);
    }

    .empty-state-icon {
      font-size: 3rem;
      margin-bottom: 1rem;
    }

    /* Responsive */
    @media (max-width: 767px) {
      header h1 {
        font-size: 1.5rem;
      }

      .sidebar {
        position: static;
        order: 2;
      }

      .content {
        order: 1;
      }

      .layout {
        grid-template-columns: 1fr;
      }

      .slots-grid {
        grid-template-columns: repeat(4, 1fr);
      }

      .reservation-item {
        flex-direction: column;
        align-items: stretch;
      }

      .reservation-item button {
        width: 100%;
      }
    }

    /* Utility */
    .mt-1 { margin-top: 1rem; }
    .mt-2 { margin-top: 2rem; }
    .mb-1 { margin-bottom: 1rem; }
    .mb-2 { margin-bottom: 2rem; }
    .text-muted { color: var(--text-light); }
    .text-center { text-align: center; }
  </style>
</head>
<body>
  <header>
    <h1>📹 Riverside Studio Scheduler</h1>
    <p>Reserve your studio time in 15-minute increments</p>
  </header>

  <div class="container">
    <div id="messages"></div>

    <div class="layout">
      <!-- Sidebar: Reservation Form -->
      <div class="sidebar">
        <h3>Make a Reservation</h3>

        <div class="form-group">
          <label for="name">Your Name</label>
          <input type="text" id="name" placeholder="Full name" required>
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="you@example.com" required>
        </div>

        <div class="form-group">
          <label for="date">Date</label>
          <input type="date" id="date" required>
        </div>

        <div class="form-group">
          <label for="time">Time</label>
          <select id="time" required disabled>
            <option value="">Select a time</option>
          </select>
        </div>

        <button class="btn btn-primary" id="reserveBtn">Reserve Now</button>

        <div class="form-group mt-2">
          <label for="filterEmail">View My Reservations</label>
          <input type="email" id="filterEmail" placeholder="Enter your email">
        </div>
        <button class="btn btn-secondary" id="filterBtn">Load My Bookings</button>
      </div>

      <!-- Main Content: Schedule -->
      <div class="content">
        <div class="tabs">
          <button class="tab-btn active" data-tab="schedule">Schedule</button>
          <button class="tab-btn" data-tab="reservations">My Bookings</button>
        </div>

        <!-- Schedule Tab -->
        <div id="schedule" class="tab-content active">
          <h2>Available Times</h2>
          <p class="text-muted" style="margin-bottom: 1rem;">Select a date to see available time slots</p>
          
          <div id="slotsContainer" class="loading">
            <div class="spinner"></div>
            <p>Loading schedule...</p>
          </div>
        </div>

        <!-- Reservations Tab -->
        <div id="reservations" class="tab-content">
          <h2>Your Reservations</h2>
          <div id="myReservations" class="empty-state">
            <p>No reservations yet. Start by selecting a date and time in the form.</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Call Netlify Functions
    const API = {
      getReservations: () => 
        fetch('/.netlify/functions/reservations?action=list').then(r => r.json()),
      
      getAvailable: (date) => 
        fetch(`/.netlify/functions/reservations?action=available&date=${date}`).then(r => r.json()),
      
      reserve: (date, time, name, email) => 
        fetch('/.netlify/functions/reservations?action=reserve', {
          method: 'POST',
          body: JSON.stringify({ date, time, name, email })
        }).then(r => r.json()),
      
      cancel: (id, email) =>
        fetch('/.netlify/functions/reservations?action=cancel', {
          method: 'DELETE',
          body: JSON.stringify({ id, email })
        }).then(r => r.json())
    };

    const state = {
      selectedDate: null,
      selectedTime: null,
      reservations: [],
      userEmail: null
    };

    // Set minimum date to today
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('date').min = today;
    document.getElementById('date').value = today;

    // Event: Date picker change
    document.getElementById('date').addEventListener('change', (e) => {
      state.selectedDate = e.target.value;
      state.selectedTime = null;
      document.getElementById('time').disabled = true;
      document.getElementById('time').innerHTML = '<option value="">Loading times...</option>';
      loadTimeSlots();
    });

    // Event: Time picker change
    document.getElementById('time').addEventListener('change', (e) => {
      state.selectedTime = e.target.value;
    });

    // Event: Tab switching
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        e.target.classList.add('active');
        document.getElementById(e.target.dataset.tab).classList.add('active');
      });
    });

    // Event: Reserve button
    document.getElementById('reserveBtn').addEventListener('click', async () => {
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const date = state.selectedDate;
      const time = state.selectedTime;

      if (!name || !email || !date || !time) {
        showMessage('Please fill in all fields', 'error');
        return;
      }

      const btn = document.getElementById('reserveBtn');
      btn.disabled = true;
      btn.textContent = 'Reserving...';

      try {
        const result = await API.reserve(date, time, name, email);
        if (result.error) throw new Error(result.error);

        showMessage(`✓ Reserved for ${time} on ${date}!`, 'success');
        
        // Reset form
        document.getElementById('name').value = '';
        document.getElementById('email').value = '';
        document.getElementById('time').value = '';
        state.selectedTime = null;

        // Refresh reservations
        await loadReservations();
        await loadTimeSlots();
      } catch (err) {
        showMessage(`Error: ${err.message}`, 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Reserve Now';
      }
    });

    // Event: Filter reservations by email
    document.getElementById('filterBtn').addEventListener('click', () => {
      const email = document.getElementById('filterEmail').value.trim();
      if (!email) {
        showMessage('Enter your email to view reservations', 'error');
        return;
      }
      state.userEmail = email;
      renderMyReservations();
    });

    // Load initial data
    async function initialize() {
      await loadReservations();
      await loadTimeSlots();
    }

    async function loadReservations() {
      try {
        state.reservations = await API.getReservations();
      } catch (err) {
        console.error('Error loading reservations:', err);
      }
      renderMyReservations();
    }

    async function loadTimeSlots() {
      if (!state.selectedDate) return;

      try {
        const slots = await API.getAvailable(state.selectedDate);
        const timeSelect = document.getElementById('time');
        
        timeSelect.innerHTML = '<option value="">Select a time</option>';
        const availableSlots = slots.filter(s => s.available);

        if (availableSlots.length === 0) {
          timeSelect.innerHTML = '<option disabled>No times available</option>';
          timeSelect.disabled = true;
          return;
        }

        availableSlots.forEach(slot => {
          const opt = document.createElement('option');
          opt.value = slot.time;
          opt.textContent = slot.time;
          timeSelect.appendChild(opt);
        });

        timeSelect.disabled = false;

        // Render time slots visually
        const container = document.getElementById('slotsContainer');
        const html = '<div class="slots-grid">' +
          slots.map(s => `
            <div class="slot ${s.available ? 'available' : 'booked'}" 
                 data-time="${s.time}" 
                 onclick="${s.available ? `selectTime('${s.time}')` : ''}"
                 title="${s.available ? 'Click to select' : 'Booked'}">
              ${s.time}
            </div>
          `).join('') +
          '</div>';
        container.innerHTML = html;

        if (state.selectedTime) {
          const selected = container.querySelector(`[data-time="${state.selectedTime}"]`);
          if (selected) selected.classList.add('selected');
        }
      } catch (err) {
        console.error('Error loading slots:', err);
        document.getElementById('slotsContainer').innerHTML = '<p class="error">Error loading schedule</p>';
      }
    }

    function selectTime(time) {
      state.selectedTime = time;
      document.getElementById('time').value = time;
      
      document.querySelectorAll('.slot').forEach(s => s.classList.remove('selected'));
      document.querySelector(`[data-time="${time}"]`).classList.add('selected');
    }

    function renderMyReservations() {
      const container = document.getElementById('myReservations');
      const filtered = state.userEmail 
        ? state.reservations.filter(r => r.email === state.userEmail)
        : [];

      if (filtered.length === 0) {
        container.innerHTML = '<div class="empty-state"><p>No reservations found.</p></div>';
        return;
      }

      container.innerHTML = '<div class="reservations-list">' +
        filtered
          .sort((a, b) => new Date(a.date + 'T' + a.time) - new Date(b.date + 'T' + b.time))
          .map(r => `
            <div class="reservation-item">
              <div class="reservation-info">
                <div class="reservation-time">${r.time}</div>
                <div class="reservation-name">${r.date} • ${r.name}</div>
              </div>
              <button class="btn btn-danger" onclick="cancelReservation('${r.id}', '${r.email}')">
                Cancel
              </button>
            </div>
          `)
          .join('') +
        '</div>';
    }

    async function cancelReservation(id, email) {
      if (!confirm('Cancel this reservation?')) return;

      try {
        const result = await API.cancel(id, email);
        if (result.error) throw new Error(result.error);

        showMessage('✓ Reservation cancelled', 'success');
        await loadReservations();
        await loadTimeSlots();
      } catch (err) {
        showMessage(`Error: ${err.message}`, 'error');
      }
    }

    function showMessage(text, type) {
      const msg = document.createElement('div');
      msg.className = `message ${type}`;
      msg.textContent = text;
      document.getElementById('messages').appendChild(msg);

      setTimeout(() => msg.remove(), 4000);
    }

    // Initialize
    initialize();
  </script>
</body>
</html>
